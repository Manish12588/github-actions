name: Day 44 Task-6 | Caching

on:
    workflow_dispatch:
        
jobs:
    caching:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: setup python version 3.12
              uses: actions/setup-python@v5
              with:
                python-version: 3.12
            
            - name: Chache pip dependency
              uses: actions/cache@v5
              with:
                path: ~/.cache/pip
                key: pip-${{ hashFiles('requirements.txt') }}
                restore-keys: pip-
                  
            - name: Install dependencies
              run: pip install -r requirement.txt