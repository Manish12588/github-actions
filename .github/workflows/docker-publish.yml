name: Docker Image Build and Push (Docker CICD)

on:
  push:
    branches:
      - main
  pull_request: 
    types: [opened,synchronize,reopened]
        
jobs:
    docker-build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_TOKEN }}
            
            - name: Build and Push if branch is main
              if: github.ref_name == 'main'
              uses: docker/build-push-action@v6
              with:
                context: .  #Path of the docker file
                push: true
                tags: |
                  ${{secrets.DOCKER_USERNAME}}/repo:latest
                  ${{secrets.DOCKER_USERNAME}}/repo:${{github.sha}} 
            
            - name: Build only if branch is not main
              if: github.ref_name != 'main'
              uses: docker/build-push-action@v6
              with:
                context: .  #Path of the docker file
                push: false
                tags: ${{ secrets.DOCKER_USERNAME }}/repo:pr-${{ github.sha }}