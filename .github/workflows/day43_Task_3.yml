name: Day 43 Task-3 | Job Outputs

on:
  workflow_dispatch:

jobs:
  set_date:
    #runs-on: ubuntu-latest
    runs-on: self-hosted
    outputs:
      todayDate: ${{ steps.get-date.outputs.date }}
    steps:
      - name: Setting today's date
        id: set-date
        run: echo "date=$(date)" >> $GITHUB_OUTPUT

      - name: printing date in set_date job
        run: echo "set_date job:" ${{ steps.get-date.outputs.date }}
  
  print_date:
    #runs-on: ubuntu-latest
    runs-on: self-hosted
    needs: set_date
    steps:
      - name: Print the current date
        run: echo "Current Date:" ${{ needs.set_date.outputs.todayDate }}


