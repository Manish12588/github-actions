name: Day 43 Task-3 | Job Outputs

on:
  workflow_dispatch:

jobs:
  set_date:
    #runs-on: ubuntu-latest
    runs-on: self-hosted
    outputs:
      today_date: ${{ steps.get-date.outputs.date }}
    steps:
      - name: Setting today's date
        id: get-date
        run: echo "date=$(date)" >> $GITHUB_OUTPUT

      - name: printing date in set_date job
        run: echo "Output from job-1 :" ${{ steps.get-date.outputs.date }}

      - name: Printing github variable output
        run: echo $GITHUB_OUTPUT
  
  #Reading output from Job 1 (set_date)
  print_date:
    #runs-on: ubuntu-latest
    runs-on: self-hosted
    needs: set_date
    steps:
      - name: Print the current date
        run: echo "Current Date:" ${{ needs.set_date.outputs.today_date }}


