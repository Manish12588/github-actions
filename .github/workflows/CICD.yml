#This is the name of the workflow which will be displayed in the Action Tab of git repo
name: CICD

#Whenever we wanted to run our actions manually
on:
    workflow_dispatch:
       inputs:
        environment:
           description: Environment value where workflow runs
           default: 'dev'
           required: true
           type: choice
           options:
             - dev
             - test
             - staging
             - prod
jobs:
  # every job needs seperate runner, its called parallelism
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "COde Clone from GitHub"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Docker Container build"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"

  #Adding condition for deployment if environment is dev      
  deploy:
    if: inputs.environment == 'dev'
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"